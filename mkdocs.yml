site_name: Nolapse
site_url: https://ecbo-docs.up.railway.app/
theme:
  name: material
nav:
  - Home: 'index.md'
  - Strategic Positioning: 'product/strategic-positioning.md'
  - Product Strategy (v3):
    - Overview: 'product/ai-agent-governance/index.md'
    - 'Blocker 1: Agent Scaling Wall': 'product/ai-agent-governance/agent-scaling-wall.md'
    - 'Blocker 2: Enterprise Deal Stall': 'product/ai-agent-governance/enterprise-ai-governance.md'
    - 'Blocker 3: Production Incident Risk': 'product/ai-agent-governance/production-risk-agents.md'
  - Product Development:
    - 'MVP Definition': 'product/mvp-definition.md'
    - 'Product Requirements': 'product/prds.md'
    - 'Roadmap': 'product/roadmap.md'
  - Go-to-Market:
    - 'GTM Strategy': 'marketing/gtm-pps.md'
    - 'Competitive Landscape': 'marketing/competitive-landscape.md'
    - 'Coverage Model': 'marketing/coverage_model_summary.md'
  - Architecture & Design:
    - 'System Architecture': 'product/architecture.md'
    - 'Architecture Decision Records': 'technical/architecture_decision_records.md'
    - 'Repository Model': 'technical/hybrid_repository_model_using_git_submodules.md'
    - 'API Design': 'technical/api_contracts_and_versioning_strategy.md'
  - Security & Compliance:
    - 'Threat Modeling (C4 & STRIDE)': 'security/c4-stride.md'
    - 'Trust Boundaries': 'security/trust_boundary_diagram.md'
  - Technical Implementation:
    - 'Technology Stack': 'technical/tech_stack.md'
    - 'Runner Blueprint': 'technical/runner_implementation_blueprint.md'
    - 'CI/CD Integrations': 'technical/ci_integrations.md'
  - Operations:
    - 'Deployment Variants': 'technical/deployment_variants.md'
    - 'Cost Model': 'technical/cost_model_per_dv.md'
    - 'Execution Lifecycle': 'technical/execution_lifecycle_and_state_machine.md'
    - 'Scheduling Algorithm': 'technical/orchestrator_scheduling_algorithm.md'
  - Archive:
    - 'Previous Versions': 'archive/index.md'
    - 'v2.0 - Coverage Governance': 'archive/v2-coverage-governance/README.md'
plugins:
  - search:
      lang: en
  - macros:
      on_undefined: lax
  - mermaid2:
      version: 10.0.2
  - print-site:
      # Table of contents
      add_table_of_contents: true
      toc_title: 'Table of Contents'
      toc_depth: 6
      # Content-related
      add_full_urls: false
      enumerate_headings: true
      enumerate_figures: true
      add_cover_page: true
      cover_page_template: ""
      path_to_pdf: ""
      include_css: true
      enabled: true
markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format



