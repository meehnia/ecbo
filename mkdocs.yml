site_name: Nolapse
site_url: https://ecbo-docs.up.railway.app/
theme:
  name: material
  edit_uri: ""
nav:
  - Home: 'index.md'
  - Strategic Positioning: 'product/strategic-positioning.md'
  - Product Strategy (v3):
    - Overview: 'product/ai-agent-governance/index.md'
    - 'Blocker 1: Agent Scaling Wall': 'product/ai-agent-governance/agent-scaling-wall.md'
    - 'Blocker 2: Enterprise Deal Stall': 'product/ai-agent-governance/enterprise-ai-governance.md'
    - 'Blocker 3: Production Incident Risk': 'product/ai-agent-governance/production-risk-agents.md'
  - Product Development:
    - 'MVP Definition': 'product/mvp-definition.md'
    - 'Baseline Concept Pitch': 'product/baseline_concept_pitch.md'
    - 'Case Study Template': 'product/case_study_template.md'
    - 'Design Partner Outreach': 'product/design_partner_outreach.md'
    - 'Product Requirements': 'product/prds.md'
    - 'Software Requirements Spec': 'product/srs.md'
    - 'Roadmap': 'product/roadmap.md'
    - 'Strategic Decisions': 'product/strategic_decisions.md'
    - 'PACE Framework': 'product/pace_framework.md'
  - Go-to-Market:
    - 'GTM Strategy': 'marketing/gtm-pps.md'
    - 'Competitive Landscape': 'marketing/competitive-landscape.md'
    - 'Coverage Model': 'marketing/coverage_model_summary.md'
    - 'Persona & Value Props': 'product/persona_value_props.md'
    - 'Monetization Model': 'product/monetization_model.md'
  - Business & Compliance:
    - 'Compliance Audit Package': 'product/compliance_audit_package.md'
    - 'Data Room Index': 'product/data_room_index.md'
    - 'Onboarding': 'product/onboarding.md'
  - Architecture & Design:
    - 'System Architecture': 'product/architecture.md'
    - 'API Design': 'technical/api-design.md'
    - 'API Contracts & Versioning': 'technical/api_contracts_and_versioning_strategy.md'
    - 'Tech Stack': 'technical/tech_stack.md'
  - Security & Compliance:
    - 'STRIDE Threat Analysis': 'security/stride-threat-analysis.md'
    - 'Trust Boundary Diagram': 'security/trust_boundary_diagram.md'
    - 'C4-STRIDE': 'security/c4-stride.md'
  - Technical Implementation:
    - 'Implementation Blueprint': 'technical/implementation-blueprint.md'
    - 'Execution Lifecycle': 'technical/execution_lifecycle.md'
    - 'Execution Lifecycle & State Machine': 'technical/execution_lifecycle_and_state_machine.md'
    - 'Architecture Decision Records': 'technical/architecture_decision_records.md'
    - 'CI Integrations': 'technical/ci_integrations.md'
    - 'Cost Model': 'technical/cost_model_per_dv.md'
    - 'Deployment Variants': 'technical/deployment_variants.md'
    - 'Hybrid Repository Model': 'technical/hybrid_repository_model_using_git_submodules.md'
    - 'Orchestrator Scheduling Algorithm': 'technical/orchestrator_scheduling_algorithm.md'
    - 'Runner Implementation Blueprint': 'technical/runner_implementation_blueprint.md'
  - Archive:
    - 'Previous Versions': 'archive/index.md'
    - 'v2.0 - Coverage Governance': 'archive/v2-coverage-governance/README.md'
plugins:
  - search:
      lang: en
  - macros:
      on_undefined: lax
  - mermaid2:
      version: 10.0.2
  - print-site:
      # Table of contents
      add_table_of_contents: true
      toc_title: 'Table of Contents'
      toc_depth: 6
      # Content-related
      add_full_urls: false
      enumerate_headings: true
      enumerate_figures: true
      add_cover_page: true
      cover_page_template: ""
      path_to_pdf: ""
      include_css: true
      enabled: true
markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format



